
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="book">
        <h1>Welcome</h1>
        <p>Enter the code to continue.</p>
        <button onclick="checkPassword()">Enter Code</button>
    </div>

    <script>
        function checkPassword() {
            const code = prompt("Enter the code:");
            if (code === "1234") {
                window.location.href = "book.html";
            } else {
                alert("Wrong code!");
            }
        }
    </script>
</body>
</html>
