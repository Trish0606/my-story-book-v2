<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Story for You</title>
    <style>
        body {
            background: linear-gradient(to bottom, #87CEEB, #ffffff);
            height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Georgia', serif; perspective: 1500px;
        }

        body::before, body::after {
            content: ''; position: fixed; top: 0; width: 300px; height: 100vh;
            background-image: url('http://googleusercontent.com/image_collection/image_retrieval/7672036856911881778_0'); 
            background-size: contain; background-repeat: no-repeat; z-index: 1; pointer-events: none;
        }
        body::before { left: -50px; }
        body::after { right: -50px; transform: scaleX(-1); }

        #flower-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        .flower { position: absolute; background-size: contain; background-repeat: no-repeat; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .book-container { width: 400px; height: 500px; position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .book-cover { 
            width: 100%; height: 100%; position: absolute;
            background-image: url('http://googleusercontent.com/image_collection/image_retrieval/2152451007810593467_0');
            background-size: cover; background-position: center; border-radius: 10px; box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 1s ease;
        }

        .access-gate { position: absolute; width: 80%; padding: 30px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 15px; text-align: center; z-index: 20; }
        button { margin-top: 20px; padding: 12px 30px; background: rgba(255, 183, 197, 0.8); border: none; cursor: pointer; border-radius: 25px; color: white; font-weight: bold; font-family: 'Georgia', serif; }
    </style>
</head>
<body>
    <div id="flower-container"></div>
    <div class="book-container">
        <div class="book-cover" id="myBook">
            <div class="access-gate" id="accessForm">
                <h2>A Story for You</h2>
                <p>Enter the code to continue.</p>
                <button onclick="checkPassword()">Unlock Story</button>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            const code = prompt("What is our special code?");
            if (code === "1234") {
                document.getElementById('myBook').style.transform = 'rotateY(-180deg) translateZ(100px) scale(0.8)';
                document.getElementById('myBook').style.opacity = '0';
                setTimeout(() => { window.location.href = "book.html"; }, 1000);
            } else { alert("Incorrect!"); }
        }

        function createFlower() {
            const container = document.getElementById('flower-container');
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.style.backgroundImage = "url('https://upload.wikimedia.org/wikipedia/commons/e/ef/Petal_blossom.png')";
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.width = flower.style.height = (Math.random() * 20 + 10) + 'px';
            flower.style.animationDuration = Math.random() * 5 + 8 + 's';
            container.appendChild(flower);
            setTimeout(() => { flower.remove(); }, 15000);
        }
        setInterval(createFlower, 300);
    </script>
</body>
</html>
